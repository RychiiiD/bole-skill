scoring:
  weights:
    salary: 10
    experience: 4
    education: 3
    relevance: 5
  salary_tiers:
    - max_k: 4
      score: 1
    - max_k: 6
      score: 2
    - max_k: 8
      score: 3
    - max_k: 10
      score: 4
    - max_k: 15
      score: 5
    - max_k: 20
      score: 6
    - max_k: 30
      score: 7
    - max_k: 999
      score: 8
  salary_default_score: 3
  experience:
    "3-5年": 5
    "5-10年": 4
    "1-3年": 4
    "不限": 3
    "实习": 2
    "应届": 2
    "10年以上": 3
    default: 3
  education:
    "博士": 5
    "硕士": 5
    "本科": 5
    "大专": 4
    default: 3
  relevance_filter:
    min_score: 4
  company_filter:
    exclude_patterns:
      - "某"
      - "商贸店"
      - "食品经..."
      - "美容..."
      - "汽车..."
      - "信息..."
      - "电子产..."
      - "科技..."
      - "金钰源科技..."
      - "渤海盛宴农..."
      - "红圆理疗馆"
      - "福商电子产..."
      - "神州伙伴电..."
      - "有模有样潮..."
      - "小鲤鱼信息..."
      - "经济技术开发..."
      - "长江路经济开发..."
      - "高新技术产业开发..."
      - "环游时代旅..."
      - "明动中天影..."
    min_chinese_chars: 3
  tags:
    need_deep_threshold: 60
  enterprise_filter:
    enable: true
    exclude_hourly_wage: true
